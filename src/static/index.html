<!DOCTYPE html>
<html lang="en">
<head>
    <title>Random Quotes</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="quotes.js"></script>
</head>
<body onload="init()">

<div class="container-fluid p-5 bg-primary text-white text-center">
    <h1 id="quote">"Clever Quote"</h1>
    <p id="author">By 'Smart Author'</p>
</div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-3 mb-2">
            <label for="tag-filter" class="form-label">Filter by Tag</label>
            <select id="tag-filter" class="form-select" onchange="onFilterChange()">
                <option value="">All Tags</option>
            </select>
        </div>
        <div class="col-md-3 mb-2">
            <label for="author-filter" class="form-label">Filter by Author</label>
            <select id="author-filter" class="form-select" onchange="onFilterChange()">
                <option value="">All Authors</option>
            </select>
        </div>
        <div class="col-md-2 mb-2 d-flex align-items-end">
            <button class="btn btn-primary w-100" onclick="getQuote('quote','author')">New Quote</button>
        </div>
        <div class="col-md-2 mb-2 d-flex align-items-end">
            <button class="btn btn-outline-secondary w-100" onclick="clearFilters()">Clear Filters</button>
        </div>
    </div>
    <div class="row justify-content-center mt-2">
        <div class="col-md-10 text-center">
            <small id="active-filters" class="text-muted"></small>
        </div>
    </div>
</div>

</body>
</html>
